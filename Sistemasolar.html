<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: xr"><!-- Esta es para poder verlo en realidad aumentada-->
      <a-assets>
        <img id="fractal" src="Romanesco_broccoli_texture.jpg">
        <img id="S" src="S.jpeg">
        <img id="Fondo" src="U.jpeg">
        <img id="Tierra" src="Tierra.jpg">
        

      </a-assets>
      
      <a-sphere position="0 1.25 -5" radius="2" color="yellow" src="#S" animation="property: rotation; to: 0 360 0; dur: 18000;
                   easing: linear; loop: true; dir: normal">

        <a-sphere position="10 1.25 -5" radius="0.25" color="red" src="#fractal"animation="property: rotation; to: 360 360 0; dur: 2000; easing: linear; loop: true; dir: normal">

          <a-sphere position="0.5 0.5 0.5" radius="0.1" color="white"></a-sphere>

        </a-sphere>
        <a-sphere position="20 1.5 -5" radius="0.25" color="brown" src="#fractal"></a-sphere>
        




      </a-sphere>

      <a-sphere position="0 1.25 -5" radius="0.001" color="#27CCF5" src="#fractal"  animation="property: rotation; to: 0 360 0; loop: true; dur: 160000">
        <a-sphere position="30 1.75 -5" radius="0.25"  src="#Tierra" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000" ></a-sphere>
      </a-sphere>
      
      <a-sky hide-on-enter-ar src="#Fondo"></a-sky> <!-- El cielo se quita en realidad aumentada-->
      <a-entity position="0 1.6 0" rotation="0 0 0"> 
      <a-camera wasd-controls="acceleration:100; fly:true" look-controls position="0 1.6 0"></a-camera> <!-- Esta es por defecto a la altura de los ojos -->
      <a-entity oculus-touch-controls="hand: right"></a-entity>
      <a-entity oculus-touch-controls="hand: left"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
