<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: xr">
      <a-assets>
        <img id="fractal" src="Romanesco_broccoli_texture.jpg">
        <img id="madera" src="Wood_(126508819).jpeg">
        <img id="Fondo" src="B.jpg">
      </a-assets>
      <a-box position="-1 0.5 -3" rotation="0 45 0" opacity="0.5" color="#4CC3D9"></a-box>
      <a-box position="-3 0.5 -3" rotation="0 0 0" color="#EF2D5E"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25"  src="#fractal"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5"  src="#madera"></a-cylinder>
      <a-cone position="1 2.25 -3" radius="0.2" height="1.5" color="green"></a-cone>
      <a-cone position="3 0.75 -3" radius="0.2" height="1.5" color="#8E27F5"></a-cone>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="15" height="4" color="#7BC8A4"></a-plane>
      <a-plane position="1 0 0" rotation="0 -90 0" width="2" height="4" color="blue"></a-plane>
      <a-plane position="-1 0 0" rotation="0 -270 0" width="2" height="4" color="blue"></a-plane>
      <a-plane position="0 2 0" rotation="-270 0 0" width="2" height="2" color="blue"></a-plane>
      <a-sky hide-on-enter-ar src="#Fondo"></a-sky>
    </a-scene>
  </body>
</html>
